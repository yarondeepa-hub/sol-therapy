<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sol Therapy - Events Layout Options</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark: #1a1a1a;
    --dark-deep: #0d0d0d;
    --washi: #F2EAD3;
    --washi-dim: rgba(242, 234, 211, 0.5);
    --washi-muted: rgba(242, 234, 211, 0.4);
    --washi-border: rgba(242, 234, 211, 0.08);
    --beni: #BE5069;
    --beni-light: #D4728A;
    --green: #588475;
    --green-light: #6A9A89;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, 'Segoe UI', sans-serif;
    --font-english: 'Helvetica Neue', Arial, sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--dark-deep);
    color: var(--washi);
    min-height: 100vh;
  }

  /* ===== CONTROLS BAR ===== */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #111;
    border-bottom: 1px solid var(--washi-border);
    padding: 1rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
  }

  .controls__group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .controls__label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.4;
    font-family: var(--font-english);
    direction: ltr;
    white-space: nowrap;
  }

  .controls__btn {
    padding: 0.5rem 1rem;
    background: transparent;
    border: 1px solid var(--washi-border);
    color: var(--washi);
    font-family: var(--font-body);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .controls__btn:hover {
    border-color: rgba(242, 234, 211, 0.2);
    background: rgba(242, 234, 211, 0.03);
  }
  .controls__btn--active {
    background: var(--beni);
    border-color: var(--beni);
    color: var(--washi);
  }
  .controls__btn--recommended {
    position: relative;
  }
  .controls__btn--recommended::after {
    content: 'recommended';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.5rem;
    font-family: var(--font-english);
    letter-spacing: 0.1em;
    color: var(--green);
    opacity: 0.6;
    direction: ltr;
  }

  .count-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--washi-border);
    color: var(--washi);
    font-family: var(--font-english);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .count-btn:hover {
    border-color: rgba(242, 234, 211, 0.2);
  }
  .count-btn--active {
    background: rgba(242, 234, 211, 0.1);
    border-color: rgba(242, 234, 211, 0.3);
  }

  /* ===== PREVIEW AREA ===== */
  .preview-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }

  /* ===== SECTION TITLE ===== */
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 1.2rem + 2.5vw, 3rem);
    font-weight: bold;
    color: var(--washi);
    text-align: center;
    margin-bottom: 2.5rem;
    line-height: 1.2;
  }

  /* ===== SHARED: FEATURED CARD ===== */
  .featured-card {
    display: flex;
    flex-direction: row;
    gap: 1.5rem;
    border: 1px solid var(--washi-border);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    transition: background 0.3s ease;
  }
  .featured-card:hover {
    background: rgba(242, 234, 211, 0.02);
  }

  .featured-card__image {
    flex-shrink: 0;
    width: 40%;
    max-width: 300px;
    aspect-ratio: 3 / 4;
    background: #2a2a2a;
    overflow: hidden;
    position: relative;
  }
  .featured-card__image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.3) 100%);
  }
  .featured-card__image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(0.7) sepia(0.08) contrast(1.05) brightness(0.95);
  }

  .featured-card__content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.4rem;
  }

  .event-date {
    font-family: var(--font-english);
    font-size: 0.6rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--washi);
    opacity: 0.5;
    direction: ltr;
    unicode-bidi: isolate;
  }

  .event-name {
    font-family: var(--font-display);
    font-size: clamp(1.3rem, 1rem + 1.5vw, 2rem);
    font-weight: bold;
    color: var(--washi);
    line-height: 1.15;
  }

  .event-venue {
    font-family: var(--font-english);
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--washi);
    opacity: 0.4;
    letter-spacing: 0.15em;
    direction: ltr;
    unicode-bidi: isolate;
  }

  .event-desc {
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--washi);
    opacity: 0.6;
    line-height: 1.7;
    margin-top: 0.25rem;
  }

  .event-actions {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.75rem;
    flex-wrap: wrap;
  }

  .btn-ticket {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.7rem 1.5rem;
    background: var(--beni);
    color: var(--washi);
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 400;
    border: none;
    cursor: pointer;
    min-height: 44px;
    min-width: 120px;
    text-decoration: none;
    transition: background 0.3s ease;
  }
  .btn-ticket:hover { background: var(--beni-light); }

  .link-details {
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--green);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.3em;
    min-height: 44px;
    padding: 0.5rem 0;
    transition: color 0.3s ease;
  }
  .link-details:hover { color: var(--green-light); }

  /* ===== OPTION A: COMPACT LIST ===== */
  .compact-list {
    margin-top: 0.5rem;
  }

  .compact-row {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    padding: 0.9rem 0;
    border-top: 1px solid var(--washi-border);
    transition: background 0.2s ease;
  }
  .compact-row:hover {
    background: rgba(242, 234, 211, 0.02);
  }
  .compact-row:last-child {
    border-bottom: 1px solid var(--washi-border);
  }

  .compact-row__date {
    font-family: var(--font-english);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--washi);
    opacity: 0.5;
    direction: ltr;
    unicode-bidi: isolate;
    min-width: 80px;
    flex-shrink: 0;
  }

  .compact-row__name {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: bold;
    color: var(--washi);
    flex: 1;
  }

  .compact-row__venue {
    font-family: var(--font-english);
    font-size: 0.7rem;
    color: var(--washi);
    opacity: 0.35;
    direction: ltr;
    unicode-bidi: isolate;
    min-width: 100px;
    text-align: left;
    flex-shrink: 0;
  }

  .compact-row__ticket {
    font-family: var(--font-body);
    font-size: 0.75rem;
    color: var(--beni);
    text-decoration: none;
    white-space: nowrap;
    min-height: 44px;
    display: flex;
    align-items: center;
    padding: 0 0.5rem;
    flex-shrink: 0;
    transition: color 0.2s ease;
  }
  .compact-row__ticket:hover { color: var(--beni-light); }

  /* ===== OPTION B: GRID ===== */
  .grid-layout {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.25rem;
  }
  .grid-layout--single {
    grid-template-columns: 1fr;
    max-width: 480px;
    margin: 0 auto;
  }

  .grid-card {
    border: 1px solid var(--washi-border);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: background 0.3s ease;
  }
  .grid-card:hover {
    background: rgba(242, 234, 211, 0.02);
  }

  .grid-card__image {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #2a2a2a;
    overflow: hidden;
    position: relative;
  }
  .grid-card__image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.3) 100%);
  }
  .grid-card__image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(0.7) sepia(0.08) contrast(1.05) brightness(0.95);
  }

  .grid-card__content {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .grid-card .event-name {
    font-size: 1.1rem;
  }

  .grid-card .event-actions {
    margin-top: 0.5rem;
  }

  .grid-card .btn-ticket {
    padding: 0.6rem 1.2rem;
    font-size: 0.75rem;
    min-width: 100px;
  }

  /* ===== OPTION C: SWIPE STRIP ===== */
  .strip-label {
    font-family: var(--font-body);
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--washi);
    opacity: 0.35;
    margin-bottom: 1rem;
    margin-top: 0.5rem;
  }

  .swipe-strip {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 0.5rem;
    /* hide scrollbar */
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .swipe-strip::-webkit-scrollbar { display: none; }

  .strip-card {
    flex-shrink: 0;
    width: 180px;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    cursor: pointer;
    transition: opacity 0.2s ease;
    text-decoration: none;
    color: inherit;
  }
  .strip-card:hover {
    opacity: 0.85;
  }

  .strip-card__image {
    width: 180px;
    height: 180px;
    background: #2a2a2a;
    overflow: hidden;
    position: relative;
  }
  .strip-card__image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.4) 100%);
  }
  .strip-card__image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(0.7) sepia(0.08) contrast(1.05) brightness(0.95);
  }

  .strip-card .event-date {
    font-size: 0.55rem;
  }

  .strip-card .event-name {
    font-size: 0.9rem;
    line-height: 1.2;
  }

  .strip-card .event-venue {
    font-size: 0.65rem;
  }

  /* ===== PLACEHOLDER IMAGES ===== */
  .placeholder-img {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #2a2a2a 0%, #3a3a3a 50%, #2a2a2a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .placeholder-img svg {
    width: 40%;
    height: 40%;
    opacity: 0.15;
  }

  /* ===== MOBILE ===== */
  @media (max-width: 700px) {
    .featured-card {
      flex-direction: column;
    }
    .featured-card__image {
      width: 100%;
      max-width: none;
      aspect-ratio: 16 / 9;
    }
    .grid-layout {
      grid-template-columns: 1fr;
    }
    .compact-row {
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .compact-row__venue {
      min-width: unset;
    }
    .controls {
      padding: 0.75rem 1rem;
      gap: 0.5rem;
    }
    .controls__btn {
      font-size: 0.7rem;
      padding: 0.4rem 0.7rem;
    }
  }

  /* ===== ANIMATION ===== */
  .fade-enter {
    animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== HIDDEN ===== */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="controls">
  <div class="controls__group">
    <span class="controls__label">LAYOUT</span>
    <button class="controls__btn controls__btn--active" data-layout="a" onclick="setLayout('a')">א - מודגש + רשימה</button>
    <button class="controls__btn" data-layout="b" onclick="setLayout('b')">ב - גריד</button>
    <button class="controls__btn controls__btn--recommended" data-layout="c" onclick="setLayout('c')">ג - מודגש + סוואיפ</button>
  </div>
  <div class="controls__group">
    <span class="controls__label">EVENTS</span>
    <button class="count-btn count-btn--active" data-count="1" onclick="setCount(1)">1</button>
    <button class="count-btn" data-count="2" onclick="setCount(2)">2</button>
    <button class="count-btn" data-count="3" onclick="setCount(3)">3</button>
    <button class="count-btn" data-count="4" onclick="setCount(4)">4</button>
  </div>
</div>

<div class="preview-wrap">
  <h2 class="section-title">אירועים קרובים</h2>
  <div id="preview"></div>
</div>

<script>
var events = [
  {
    name: 'סול תרפי - מוזיאון תל אביב',
    date: '15 JUN 2026 / 21:00',
    dateShort: '15 JUN',
    venue: 'Tel Aviv Museum of Art',
    venueHe: 'מוזיאון תל אביב',
    desc: 'ערב מדיטציית סאונד עם אמנים מובילים. צלילה לתוך התודעה דרך מוזיקה חיה.',
    color: '#3a3535'
  },
  {
    name: 'צלילה עמוקה - סוזן דלל',
    date: '22 JUN 2026 / 20:30',
    dateShort: '22 JUN',
    venue: 'Suzanne Dellal Center',
    venueHe: 'מרכז סוזן דלל',
    desc: 'מסע מדיטטיבי עם צלילים אלקטרוניים ואקוסטיים.',
    color: '#2d3535'
  },
  {
    name: 'ליל הקיץ - בארבי',
    date: '04 JUL 2026 / 22:00',
    dateShort: '04 JUL',
    venue: 'Barby, Tel Aviv',
    venueHe: 'בארבי תל אביב',
    desc: 'לילה של מוזיקה מדיטטיבית תחת כיפת השמיים.',
    color: '#35302d'
  },
  {
    name: 'ריטריט שקיעה',
    date: '18 JUL 2026 / 17:00',
    dateShort: '18 JUL',
    venue: 'Palmachim Beach',
    venueHe: 'חוף פלמחים',
    desc: 'ריטריט שקיעה על חוף הים עם סאונד הילינג.',
    color: '#352d33'
  }
];

var state = { layout: 'a', count: 1 };

function placeholderSVG() {
  return '<div class="placeholder-img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div>';
}

function featuredCard(ev) {
  return '<article class="featured-card fade-enter">' +
    '<div class="featured-card__image">' + placeholderSVG() + '</div>' +
    '<div class="featured-card__content">' +
      '<span class="event-date">' + ev.date + '</span>' +
      '<h3 class="event-name">' + ev.name + '</h3>' +
      '<span class="event-venue">' + ev.venue + '</span>' +
      '<p class="event-desc">' + ev.desc + '</p>' +
      '<div class="event-actions">' +
        '<a href="#" class="btn-ticket">כרטיסים</a>' +
        '<a href="#" class="link-details">פרטים נוספים &#8592;</a>' +
      '</div>' +
    '</div>' +
  '</article>';
}

function compactRow(ev) {
  return '<div class="compact-row fade-enter">' +
    '<span class="compact-row__date">' + ev.dateShort + '</span>' +
    '<span class="compact-row__name">' + ev.name + '</span>' +
    '<span class="compact-row__venue">' + ev.venue + '</span>' +
    '<a href="#" class="compact-row__ticket">כרטיסים &#8592;</a>' +
  '</div>';
}

function gridCard(ev) {
  return '<article class="grid-card fade-enter">' +
    '<div class="grid-card__image">' + placeholderSVG() + '</div>' +
    '<div class="grid-card__content">' +
      '<span class="event-date">' + ev.date + '</span>' +
      '<h3 class="event-name">' + ev.name + '</h3>' +
      '<span class="event-venue">' + ev.venue + '</span>' +
      '<div class="event-actions">' +
        '<a href="#" class="btn-ticket">כרטיסים</a>' +
        '<a href="#" class="link-details">פרטים &#8592;</a>' +
      '</div>' +
    '</div>' +
  '</article>';
}

function stripCard(ev) {
  return '<a href="#" class="strip-card fade-enter">' +
    '<div class="strip-card__image">' + placeholderSVG() + '</div>' +
    '<span class="event-date">' + ev.dateShort + '</span>' +
    '<span class="event-name">' + ev.name + '</span>' +
    '<span class="event-venue">' + ev.venue + '</span>' +
  '</a>';
}

function renderOptionA(evs) {
  var html = featuredCard(evs[0]);
  if (evs.length > 1) {
    html += '<div class="compact-list">';
    for (var i = 1; i < evs.length; i++) {
      html += compactRow(evs[i]);
    }
    html += '</div>';
  }
  return html;
}

function renderOptionB(evs) {
  var cls = evs.length === 1 ? 'grid-layout grid-layout--single' : 'grid-layout';
  var html = '<div class="' + cls + '">';
  for (var i = 0; i < evs.length; i++) {
    html += gridCard(evs[i]);
  }
  html += '</div>';
  return html;
}

function renderOptionC(evs) {
  var html = featuredCard(evs[0]);
  if (evs.length > 1) {
    html += '<div class="strip-label">גם בקרוב</div>';
    html += '<div class="swipe-strip">';
    for (var i = 1; i < evs.length; i++) {
      html += stripCard(evs[i]);
    }
    html += '</div>';
  }
  return html;
}

function render() {
  var preview = document.getElementById('preview');
  var evs = events.slice(0, state.count);

  if (state.layout === 'a') {
    preview.innerHTML = renderOptionA(evs);
  } else if (state.layout === 'b') {
    preview.innerHTML = renderOptionB(evs);
  } else {
    preview.innerHTML = renderOptionC(evs);
  }
}

function setLayout(layout) {
  state.layout = layout;
  document.querySelectorAll('[data-layout]').forEach(function(btn) {
    btn.classList.toggle('controls__btn--active', btn.dataset.layout === layout);
  });
  render();
}

function setCount(count) {
  state.count = count;
  document.querySelectorAll('[data-count]').forEach(function(btn) {
    btn.classList.toggle('count-btn--active', parseInt(btn.dataset.count) === count);
  });
  render();
}

// Initial render
render();
</script>
</body>
</html>
